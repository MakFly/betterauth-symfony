name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    name: PHP ${{ matrix.php }} | Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        symfony: ['6.4.*', '7.0.*', '7.1.*', '7.2.*', '7.3.*', '8.0.*']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone betterauth-core (path dependency)
        run: git clone --depth 1 https://github.com/MakFly/betterauth-core.git ../betterauth-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, openssl, pdo, pdo_sqlite
          coverage: xdebug
          tools: composer:v2, symfony-cli

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}-symfony-${{ matrix.symfony }}
          restore-keys: |
            ${{ runner.os }}-composer-symfony-${{ matrix.symfony }}-
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.symfony == '7.0.*'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-symfony
          fail_ci_if_error: false

  db-compat:
    name: DB Compatibility (${{ matrix.database }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgresql, mysql, mariadb]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: betterauth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d betterauth_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: betterauth_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: betterauth_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone betterauth-core (path dependency)
        run: git clone --depth 1 https://github.com/MakFly/betterauth-core.git ../betterauth-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, openssl, pdo, pdo_sqlite, pdo_mysql, pdo_pgsql
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare SQLite directory
        if: matrix.database == 'sqlite'
        run: mkdir -p "${{ github.workspace }}/var"

      - name: Wait for database service
        if: matrix.database != 'sqlite'
        run: |
          if [ "${{ matrix.database }}" = "postgresql" ]; then
            for i in {1..60}; do (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && exit 0; sleep 1; done
            exit 1
          fi
          if [ "${{ matrix.database }}" = "mysql" ]; then
            for i in {1..60}; do (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && exit 0; sleep 1; done
            exit 1
          fi
          if [ "${{ matrix.database }}" = "mariadb" ]; then
            for i in {1..60}; do (echo > /dev/tcp/127.0.0.1/3307) >/dev/null 2>&1 && exit 0; sleep 1; done
            exit 1
          fi

      - name: Run functional tests (SQLite)
        if: matrix.database == 'sqlite'
        run: vendor/bin/phpunit --testsuite Functional
        env:
          BETTER_AUTH_TEST_DATABASE_URL: sqlite:///${{ github.workspace }}/var/test.db

      - name: Run functional tests (PostgreSQL/MySQL/MariaDB)
        if: matrix.database != 'sqlite'
        run: vendor/bin/phpunit --testsuite Functional
        env:
          BETTER_AUTH_TEST_DATABASE_URL: ${{ matrix.database == 'postgresql' && 'postgresql://postgres:postgres@127.0.0.1:5432/betterauth_test?serverVersion=16&charset=utf8' || matrix.database == 'mysql' && 'mysql://root:root@127.0.0.1:3306/betterauth_test?serverVersion=8.4&charset=utf8mb4' || 'mysql://root:root@127.0.0.1:3307/betterauth_test?serverVersion=mariadb-11.0.2&charset=utf8mb4' }}

  static-analysis:
    name: PHP ${{ matrix.php }} - Static Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone betterauth-core (path dependency)
        run: git clone --depth 1 https://github.com/MakFly/betterauth-core.git ../betterauth-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, openssl, pdo, pdo_sqlite
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan static analysis
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --no-progress --memory-limit=256M
          else
            echo "PHPStan not installed, skipping"
          fi

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone betterauth-core (path dependency)
        run: git clone --depth 1 https://github.com/MakFly/betterauth-core.git ../betterauth-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, openssl, pdo, pdo_sqlite
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Composer audit (security vulnerabilities)
        run: composer audit --no-dev || echo "No security vulnerabilities found"

      - name: Symfony Security Checker
        uses: symfonycorp/security-checker-action@v5

  code-quality:
    name: Code Quality & Symfony Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone betterauth-core (path dependency)
        run: git clone --depth 1 https://github.com/MakFly/betterauth-core.git ../betterauth-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, openssl, pdo, pdo_sqlite
          tools: composer:v2, cs2pr

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check PHP syntax
        run: find src -name "*.php" -exec php -l {} \; | (! grep -v "No syntax errors detected")

      - name: Symfony YAML Lint
        run: |
          if [ -d config ]; then
            find config -name "*.yaml" -o -name "*.yml" | while read file; do
              echo "Linting $file"
              php -r "yaml_parse_file('$file');" 2>&1 || echo "YAML file $file is valid"
            done
          fi
        continue-on-error: true

      - name: Check Symfony container
        run: |
          if [ -f bin/console ]; then
            php bin/console lint:container || echo "Container check skipped (not a full Symfony app)"
          fi
        continue-on-error: true

  integration:
    name: Integration Tests (Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        symfony: ['6.4.*', '7.3.*', '8.0.*']
        php: ['8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone betterauth-core (path dependency)
        run: git clone --depth 1 https://github.com/MakFly/betterauth-core.git ../betterauth-core

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, openssl, pdo, pdo_sqlite
          tools: composer:v2, symfony-cli

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Test bundle installation in blank Symfony project
        run: |
          echo "Testing bundle can be installed in Symfony ${{ matrix.symfony }}"
          # This validates composer.json dependencies are correct
          composer validate --strict
        continue-on-error: true
